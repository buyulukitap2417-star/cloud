<!DOCTYPE html>
<html lang="tr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA Cloud | Modern Dosya Arşivi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        canva: {
                            purple: '#8b3dff',
                            blue: '#00c4cc',
                            dark: '#0e1217',
                            card: '#1c1f26'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        .sidebar-item.active { background-color: rgba(139, 61, 255, 0.1); color: #8b3dff; border-right: 3px solid #8b3dff; }
        .dark .sidebar-item.active { background-color: rgba(139, 61, 255, 0.2); color: #a870ff; }
        
        .canva-gradient { background: linear-gradient(135deg, #8b3dff, #00c4cc); }
        .file-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 24px; overflow: hidden; }
        .file-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .modal-blur { backdrop-filter: blur(16px); background: rgba(14, 18, 23, 0.7); }
        
        #viewerFrameWrapper { transition: transform 0.2s ease-in-out; transform-origin: top center; }

        @media (max-width: 768px) {
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }

        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Kapak Stilleri */
        .cover-pdf { background: linear-gradient(135deg, #ff4b2b, #ff416c); }
        .cover-video { background: linear-gradient(135deg, #6a11cb, #2575fc); }
        .cover-archive { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .cover-generic { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden bg-[#f2f3f5] text-slate-900 dark:bg-canva-dark dark:text-slate-100">

    <!-- Yan Menü (Masaüstü) -->
    <aside class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col hidden md:flex">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8 cursor-pointer" onclick="navigateToHome()">
                <div class="w-10 h-10 canva-gradient rounded-xl flex items-center justify-center text-white shadow-lg shadow-purple-500/20">
                    <i class="fas fa-cloud text-lg"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight italic">MATOTA</span>
            </div>
            <nav class="space-y-1" id="categoryNav">
                <button onclick="setFilter('all')" id="btn-all" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all">
                    <i class="fas fa-th-large w-5 text-center"></i> Tüm Dosyalar
                </button>
                <div id="dynamicCategories" class="space-y-1"></div>
            </nav>
        </div>
        <div class="mt-auto p-6 border-t border-slate-100 dark:border-slate-800 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center opacity-60">© 2026 MATOTA Cloud</p>
        </div>
    </aside>

    <!-- Ana Alan -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Üst Header -->
        <header class="h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 md:px-8 z-20">
            <div class="flex items-center gap-3 md:hidden" onclick="navigateToHome()">
                <div class="w-8 h-8 canva-gradient rounded-lg flex items-center justify-center text-white shadow-sm">
                    <i class="fas fa-cloud text-sm"></i>
                </div>
                <h1 class="font-bold text-lg italic tracking-tighter">MATOTA</h1>
            </div>

            <div class="flex-1 max-w-xl relative mx-4">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Arşivde ara..." oninput="filterFiles()"
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-100 dark:bg-slate-800 border-transparent focus:bg-white dark:focus:bg-slate-700 focus:ring-2 focus:ring-purple-500/20 rounded-xl outline-none transition-all text-sm">
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
                <button id="adminModeBtn" onclick="handleAdminToggle()" class="hidden md:flex canva-gradient text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-purple-500/20 hover:scale-105 transition-all items-center gap-2">
                    <i id="adminIcon" class="fas fa-user-shield"></i>
                    <span id="adminBtnText">Admin</span>
                </button>
            </div>
        </header>

        <!-- Mobil Kategoriler -->
        <div class="md:hidden flex overflow-x-auto p-4 gap-2 no-scrollbar bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800">
            <button onclick="setFilter('all')" class="mobile-cat-btn whitespace-nowrap px-4 py-2 rounded-full bg-purple-100 text-purple-600 text-xs font-bold active:scale-95 transition-all" id="m-btn-all">Tümü</button>
            <div id="mobileCategories" class="flex gap-2"></div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Yönetim Paneli -->
            <section id="adminPanel" class="hidden mb-12 space-y-8 animate-fade-in">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-canva-purple"><i class="fas fa-tags"></i> Kategori Yönetimi</h3>
                    <div class="flex gap-3">
                        <input type="text" id="newCategoryInput" placeholder="Yeni kategori adı..." class="flex-1 px-4 py-2 bg-slate-50 dark:bg-slate-800 border-none rounded-xl outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white text-sm">
                        <button onclick="addCategory()" class="bg-slate-900 dark:bg-canva-purple text-white px-6 py-2 rounded-xl font-bold">Ekle</button>
                    </div>
                    <div id="categoryListContainer" class="mt-4 flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1.5 canva-gradient"></div>
                    <h2 class="text-2xl font-extrabold mb-8 text-slate-800 dark:text-white">Buluta Dosya Ekle</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <label for="fileInput" class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl p-6 md:p-10 flex flex-col items-center justify-center cursor-pointer hover:border-purple-400 hover:bg-purple-50/10 transition-all group">
                            <i class="fas fa-cloud-upload-alt text-4xl text-slate-400 mb-4 group-hover:scale-110 transition-transform"></i>
                            <p class="text-sm font-bold text-slate-600">Dosya Seç</p>
                            <input id="fileInput" type="file" class="hidden" onchange="handleFileSelect()" />
                        </label>
                        <div class="space-y-4">
                            <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                                <span class="text-[10px] font-extrabold text-slate-400 uppercase block mb-1">Web Sitesinde Görünen İsim</span>
                                <input type="text" id="customFileNameInput" placeholder="Örn: Kısa Taktikler" class="w-full bg-transparent border-none outline-none text-sm font-bold dark:text-white">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <span class="text-[10px] font-extrabold text-slate-400 uppercase block mb-1">Dosya Boyutu</span>
                                    <p id="selectedFileNameDisplay" class="text-[10px] font-bold truncate italic opacity-50">Seçim yok</p>
                                </div>
                                <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <span class="text-[10px] font-extrabold text-slate-400 uppercase block mb-1">Kategori</span>
                                    <select id="uploadCategorySelect" class="bg-transparent border-none outline-none text-xs font-bold w-full dark:text-white cursor-pointer"></select>
                                </div>
                            </div>
                            <button id="uploadBtn" disabled onclick="uploadFile()" class="canva-gradient text-white w-full py-4 rounded-2xl font-extrabold shadow-xl transition-all active:scale-95">MATOTA'ya Aktar</button>
                            <div id="uploadProgress" class="hidden h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div id="progressBar" class="canva-gradient h-full transition-all duration-300" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <h2 id="currentCategoryTitle" class="text-xl md:text-2xl font-extrabold italic mb-6">MATOTA Cloud</h2>
            <div id="fileGrid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6 pb-20">
                <div class="col-span-full py-40 text-center"><div class="inline-block w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div></div>
            </div>
        </div>
    </main>

    <!-- Görüntüleyici Modal -->
    <div id="viewerModal" class="fixed inset-0 z-[110] modal-blur hidden flex items-center justify-center p-0 md:p-8">
        <div class="bg-white dark:bg-slate-900 md:rounded-[2rem] shadow-2xl w-full h-full md:max-w-6xl md:h-[90vh] flex flex-col relative overflow-hidden animate-fade-in">
            <div class="h-16 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between px-4 md:px-6 z-10">
                <div class="flex items-center gap-2 md:gap-3 max-w-[50%]">
                    <i id="viewerIcon" class="fas fa-file-pdf text-red-500 text-lg"></i>
                    <h3 id="viewerTitle" class="font-bold text-sm md:text-base truncate">Dosya</h3>
                </div>
                <div class="flex items-center gap-1 md:gap-3">
                    <a id="viewerDownloadBtn" href="#" download class="w-9 h-9 flex items-center justify-center rounded-full bg-slate-50 dark:bg-slate-800 text-slate-400 hover:text-canva-purple transition-all"><i class="fas fa-download text-xs"></i></a>
                    <div id="pdfControls" class="hidden flex items-center gap-1 bg-slate-100 dark:bg-slate-800 rounded-lg p-1 mr-2">
                        <button onclick="zoomViewer(0.9)" class="w-8 h-8 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 rounded-md transition-all"><i class="fas fa-search-minus text-xs"></i></button>
                        <span id="zoomText" class="text-[10px] font-bold px-2 w-10 text-center">100%</span>
                        <button onclick="zoomViewer(1.1)" class="w-8 h-8 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 rounded-md transition-all"><i class="fas fa-search-plus text-xs"></i></button>
                        <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
                        <button onclick="printPDF()" class="w-8 h-8 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 rounded-md transition-all text-blue-500"><i class="fas fa-print text-xs"></i></button>
                    </div>
                    <button onclick="closeViewer()" class="w-9 h-9 flex items-center justify-center rounded-full bg-slate-50 dark:bg-slate-800 hover:text-red-500 transition-all"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="viewerContent" class="flex-1 overflow-auto bg-slate-200 dark:bg-slate-950 flex items-start justify-center p-2 md:p-4">
                <div id="viewerFrameWrapper" class="w-full h-full flex items-center justify-center"></div>
            </div>
        </div>
    </div>

    <!-- Admin Giriş Modalı -->
    <div id="passwordModal" class="fixed inset-0 z-[120] modal-blur hidden flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl w-full max-w-sm p-10 animate-fade-in relative overflow-hidden text-center">
            <div class="absolute top-0 left-0 w-full h-2 canva-gradient"></div>
            <div class="w-16 h-16 bg-purple-50 dark:bg-purple-900/20 text-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><i class="fas fa-lock-open text-2xl"></i></div>
            <h3 class="text-xl font-extrabold uppercase italic">Admin Girişi</h3>
            <input type="password" id="adminPasswordInput" placeholder="Şifre" class="w-full px-5 py-4 mt-6 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl outline-none text-center font-bold dark:text-white">
            <div class="flex flex-col gap-3 mt-6">
                <button onclick="validatePassword()" class="canva-gradient text-white w-full py-4 rounded-2xl font-extrabold shadow-xl transition-all">Giriş Yap</button>
                <button onclick="closePasswordModal()" class="text-slate-400 text-xs font-bold py-2">Kapat</button>
            </div>
        </div>
    </div>

    <!-- Bildirim -->
    <div id="toast" class="fixed bottom-10 right-1/2 translate-x-1/2 md:translate-x-0 md:right-10 transform translate-y-32 opacity-0 transition-all duration-500 pointer-events-none z-[200] w-[90%] md:w-auto">
        <div class="bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4">
            <i id="toastIcon" class="fas fa-check-circle text-purple-500"></i><span id="toastMessage" class="font-bold text-sm">Başarılı</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://xtmnfpfnxsgemjejmpaq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_AFhTTSw30vvy42C1tBkW2Q_suUE1u3G";
        const STORAGE_BUCKET = "archives";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASS = "AliSengul77MatotaOnline";

        let allFiles = [], allCategories = [], isAdmin = false, currentFilter = 'all';
        let currentZoom = 1;
        let currentPdfUrl = "";

        // --- Routing Mantığı ---
        window.onload = () => { 
            initTheme(); 
            fetchData().then(() => {
                handleInitialRouting();
            });
            document.getElementById('adminPasswordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') validatePassword(); });
            
            // Tarayıcı geri/ileri butonlarını dinle
            window.addEventListener('popstate', () => {
                handleInitialRouting();
            });
        };

        function updateUrl(category, fileName = null) {
            let path = "/";
            if (category !== 'all') {
                path += encodeURIComponent(category.toLowerCase().replace(/ /g, '-'));
                if (fileName) {
                    path += "/" + encodeURIComponent(fileName.toLowerCase().replace(/ /g, '-'));
                }
            }
            window.history.pushState({ category, fileName }, "", path);
        }

        function navigateToHome() {
            setFilter('all');
            closeViewer();
        }

        function handleInitialRouting() {
            const path = window.location.pathname.substring(1); // baştaki '/' işaretini kaldır
            if (!path) {
                setFilter('all', false);
                return;
            }

            const parts = path.split('/').map(p => decodeURIComponent(p));
            const categorySlug = parts[0];
            const fileSlug = parts[1];

            // Kategori eşleşmesi bul
            const targetCategory = allCategories.find(c => 
                c.name.toLowerCase().replace(/ /g, '-') === categorySlug
            );

            if (targetCategory) {
                setFilter(targetCategory.name, false);
                if (fileSlug) {
                    const targetFile = allFiles.find(f => 
                        f.category === targetCategory.name && 
                        f.name.toLowerCase().replace(/ /g, '-') === fileSlug
                    );
                    if (targetFile) {
                        openViewer(targetFile.url, targetFile.name, targetFile.type, false);
                    }
                }
            } else if (categorySlug === 'all') {
                setFilter('all', false);
            }
        }

        // --- Tema ve Yetki ---
        function toggleTheme() { const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); updateThemeIcon(); }
        function initTheme() { if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark'); updateThemeIcon(); }
        function updateThemeIcon() { document.getElementById('themeIcon').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon'; }

        function handleAdminToggle() { isAdmin ? toggleAdminView() : openPasswordModal(); }
        function openPasswordModal() { document.getElementById('passwordModal').classList.remove('hidden'); document.getElementById('adminPasswordInput').focus(); }
        function closePasswordModal() { document.getElementById('passwordModal').classList.add('hidden'); }
        function validatePassword() { if (document.getElementById('adminPasswordInput').value === ADMIN_PASS) { closePasswordModal(); toggleAdminView(); showToast("Admin girişi başarılı!"); } else { showToast("Şifre yanlış!", "error"); } }

        function toggleAdminView() {
            isAdmin = !isAdmin;
            document.getElementById('adminPanel').classList.toggle('hidden', !isAdmin);
            const btn = document.getElementById('adminModeBtn');
            if (btn) {
                btn.classList.toggle('bg-red-500', isAdmin);
                document.getElementById('adminBtnText').innerText = isAdmin ? "Çıkış Yap" : "Admin";
            }
            renderFiles(allFiles);
            if(isAdmin) renderCategoryManagement();
        }

        // --- Veri ---
        async function fetchData() {
            try {
                const { data: catData } = await _supabase.from('categories').select('*').order('name');
                allCategories = catData || [];
                renderSidebarCategories();
                renderMobileCategories();
                renderUploadCategories();
                const { data: fileData } = await _supabase.from('files').select('*').order('created_at', { ascending: false });
                allFiles = fileData || [];
                applyFilter();
                return true;
            } catch (e) { console.error(e); return false; }
        }

        function renderSidebarCategories() {
            const container = document.getElementById('dynamicCategories');
            if (!container) return;
            container.innerHTML = allCategories.map(cat => `
                <button onclick="setFilter('${cat.name}')" id="btn-${cat.name}" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                    <i class="fas fa-folder w-5 text-center text-xs opacity-50"></i> ${cat.name}
                </button>`).join('');
        }

        function renderMobileCategories() {
            const container = document.getElementById('mobileCategories');
            if (!container) return;
            container.innerHTML = allCategories.map(cat => `
                <button onclick="setFilter('${cat.name}')" id="m-btn-${cat.name}" class="mobile-cat-btn whitespace-nowrap px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-bold active:scale-95 transition-all">
                    ${cat.name}
                </button>`).join('');
        }

        function renderUploadCategories() {
            const select = document.getElementById('uploadCategorySelect');
            if (select) select.innerHTML = '<option value="Genel">Genel</option>' + allCategories.map(cat => `<option value="${cat.name}">${cat.name}</option>`).join('');
        }

        function setFilter(category, shouldUpdateUrl = true) {
            currentFilter = category;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const sBtn = document.getElementById(category === 'all' ? 'btn-all' : 'btn-' + category);
            if(sBtn) sBtn.classList.add('active');
            
            document.querySelectorAll('.mobile-cat-btn').forEach(el => {
                el.classList.remove('bg-purple-100', 'text-purple-600');
                el.classList.add('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300');
            });
            const mBtn = document.getElementById(category === 'all' ? 'm-btn-all' : 'm-btn-' + category);
            if(mBtn) { mBtn.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300'); mBtn.classList.add('bg-purple-100', 'text-purple-600'); }
            
            document.getElementById('currentCategoryTitle').innerText = category === 'all' ? 'MATOTA Cloud' : category;
            applyFilter();

            if (shouldUpdateUrl) updateUrl(category);
        }

        function applyFilter() {
            let filtered = allFiles.filter(f => f.name.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase()));
            if (currentFilter !== 'all') filtered = filtered.filter(f => f.category === currentFilter);
            renderFiles(filtered);
        }

        function filterFiles() { applyFilter(); }

        // --- Kapak ve Kartlar ---
        function getFileCover(file) {
            const type = (file.type || '').toLowerCase();
            if (type.includes('image')) return `<img src="${file.url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">`;

            let coverClass = "cover-generic";
            let icon = "fa-file-alt";
            if (type.includes('pdf')) { coverClass = "cover-pdf"; icon = "fa-file-pdf"; }
            else if (type.includes('video')) { coverClass = "cover-video"; icon = "fa-play-circle"; }
            else if (type.includes('zip') || type.includes('rar') || type.includes('7z')) { coverClass = "cover-archive"; icon = "fa-file-archive"; }

            return `
                <div class="w-full h-full ${coverClass} flex flex-col items-center justify-center text-white p-4 relative">
                    <i class="fas ${icon} text-4xl mb-2 opacity-30"></i>
                    <span class="text-3xl font-black tracking-tighter opacity-90 text-center leading-tight break-words px-2">${file.name}</span>
                </div>`;
        }

        function renderFiles(files) {
            const grid = document.getElementById('fileGrid');
            if (!grid) return;
            if (files.length === 0) { grid.innerHTML = `<div class="col-span-full py-32 text-center text-slate-400"><i class="fas fa-cloud-moon text-5xl mb-4"></i><p class="text-xs font-bold uppercase tracking-widest">Henüz Dosya Yok</p></div>`; return; }
            grid.innerHTML = files.map(file => `
                <div class="file-card bg-white dark:bg-slate-900 shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col group relative animate-fade-in">
                    ${isAdmin ? `<button onclick="deleteFile('${file.id}')" class="absolute top-3 right-3 w-8 h-8 bg-black/20 hover:bg-red-500 text-white backdrop-blur-md rounded-full z-10 transition-all"><i class="fas fa-trash-alt text-[10px]"></i></button>` : ''}
                    <div class="aspect-[4/3] w-full overflow-hidden cursor-pointer" onclick="openViewer('${file.url}', '${file.name}', '${file.type}')">
                        ${getFileCover(file)}
                    </div>
                    <div class="p-3 md:p-4 flex-1">
                        <h3 class="font-bold text-[11px] md:text-sm truncate dark:text-white mb-1" title="${file.name}">${file.name}</h3>
                        <div class="flex justify-between items-center text-[9px] text-slate-400 font-bold italic opacity-70">
                            <span>${formatBytes(file.size)}</span>
                            <span class="uppercase">${file.category || 'Genel'}</span>
                        </div>
                        <div class="flex gap-1.5 md:gap-2 mt-4">
                            <button onclick="openViewer('${file.url}', '${file.name}', '${file.type}')" class="flex-1 py-2 bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-white text-[9px] md:text-[10px] font-bold rounded-xl active:bg-canva-purple active:text-white transition-all">GÖSTER</button>
                            <a href="${file.url}" target="_blank" download="${file.name}" class="flex-1 py-2 bg-slate-900 dark:bg-canva-blue text-white text-[9px] md:text-[10px] font-bold rounded-xl text-center flex items-center justify-center"><i class="fas fa-download mr-1 text-[8px]"></i> İNDİR</a>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- Görüntüleyici ---
        function openViewer(url, name, type, shouldUpdateUrl = true) {
            const viewerModal = document.getElementById('viewerModal');
            const wrapper = document.getElementById('viewerFrameWrapper');
            const pdfControls = document.getElementById('pdfControls');

            document.getElementById('viewerTitle').innerText = name;
            document.getElementById('viewerDownloadBtn').href = url;
            viewerModal.classList.remove('hidden');
            
            currentZoom = 1;
            currentPdfUrl = url;
            document.getElementById('zoomText').innerText = "100%";
            wrapper.style.transform = "scale(1)";

            const t = (type || '').toLowerCase();
            if (t.includes('pdf')) {
                pdfControls.classList.remove('hidden');
                wrapper.innerHTML = `<iframe id="pdfIframe" src="${url}#toolbar=0&navpanes=0&scrollbar=0" style="width:100%; height:80vh; border-radius:12px; border:none; background: white;"></iframe>`;
                wrapper.classList.add('md:w-[850px]');
            } else if (t.includes('image')) {
                pdfControls.classList.add('hidden');
                wrapper.innerHTML = `<img src="${url}" class="max-w-full max-h-[80vh] object-contain rounded-lg shadow-2xl">`;
                wrapper.classList.remove('md:w-[850px]');
            }

            if (shouldUpdateUrl) updateUrl(currentFilter, name);
        }

        function closeViewer() { 
            document.getElementById('viewerModal').classList.add('hidden'); 
            document.getElementById('viewerFrameWrapper').innerHTML = ''; 
            updateUrl(currentFilter);
        }

        function zoomViewer(factor) {
            currentZoom = Math.max(0.5, Math.min(3, currentZoom * factor));
            document.getElementById('viewerFrameWrapper').style.transform = `scale(${currentZoom})`;
            document.getElementById('zoomText').innerText = Math.round(currentZoom * 100) + "%";
        }

        function printPDF() { if (currentPdfUrl) window.open(currentPdfUrl, '_blank').print(); }

        // --- Dosya İşlemleri & Admin ---
        function handleFileSelect() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput && fileInput.files[0]) {
                const file = fileInput.files[0];
                document.getElementById('customFileNameInput').value = file.name;
                document.getElementById('selectedFileNameDisplay').innerText = formatBytes(file.size);
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        function sanitizeForStorage(name) {
            const map = {'ç':'c','Ç':'C','ğ':'g','Ğ':'G','ı':'i','I':'i','İ':'i','ö':'o','Ö':'O','ş':'s','Ş':'S','ü':'u','Ü':'U'};
            return name.replace(/[çÇğĞıIİöÖşŞüÜ]/g, m => map[m]).replace(/[^a-zA-Z0-9.-]/g, '-').replace(/-+/g, '-').toLowerCase();
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const customNameInput = document.getElementById('customFileNameInput');
            if (!fileInput || !fileInput.files[0]) return;
            const file = fileInput.files[0];
            const visibleName = customNameInput.value.trim() || file.name;
            const storagePath = `${Date.now()}_${sanitizeForStorage(file.name)}`;
            document.getElementById('uploadProgress').classList.remove('hidden');
            updateProgress(20);
            try {
                const { error: sErr } = await _supabase.storage.from(STORAGE_BUCKET).upload(storagePath, file);
                if(sErr) throw sErr;
                updateProgress(60);
                const { data: uData } = _supabase.storage.from(STORAGE_BUCKET).getPublicUrl(storagePath);
                await _supabase.from('files').insert([{ name: visibleName, size: file.size, type: file.type, url: uData.publicUrl, category: document.getElementById('uploadCategorySelect').value }]);
                updateProgress(100);
                showToast("Buluta yüklendi!");
                resetUploadForm();
                fetchData();
            } catch (e) { showToast("Yükleme hatası!", "error"); resetUploadForm(); }
        }

        function updateProgress(v) { const bar = document.getElementById('progressBar'); if (bar) bar.style.width = v + '%'; }
        function resetUploadForm() { 
            document.getElementById('fileInput').value = ''; 
            document.getElementById('customFileNameInput').value = ''; 
            document.getElementById('selectedFileNameDisplay').innerText = 'Seçim yok'; 
            document.getElementById('uploadBtn').disabled = true; 
            document.getElementById('uploadProgress').classList.add('hidden'); 
        }

        async function addCategory() {
            const input = document.getElementById('newCategoryInput');
            if (!input.value.trim()) return;
            await _supabase.from('categories').insert([{ name: input.value.trim() }]);
            input.value = ''; fetchData();
        }
        
        function renderCategoryManagement() {
            const container = document.getElementById('categoryListContainer');
            if(!container) return;
            container.innerHTML = allCategories.map(cat => `
                <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-700 animate-fade-in">
                    <span class="text-xs font-bold">${cat.name}</span>
                    <button onclick="deleteCategory('${cat.id}')" class="text-red-400 hover:scale-110"><i class="fas fa-times-circle"></i></button>
                </div>`).join('');
        }
        
        async function deleteCategory(id) { if(confirm("Silinsin mi?")) { await _supabase.from('categories').delete().eq('id', id); fetchData(); } }
        async function deleteFile(id) { if (confirm("Kalıcı olarak silinsin mi?")) { await _supabase.from('files').delete().eq('id', id); fetchData(); } }
        function showToast(m, t = "success") { const toast = document.getElementById('toast'); if(toast) { document.getElementById('toastMessage').innerText = m; toast.classList.remove('translate-y-32', 'opacity-0'); setTimeout(() => toast.classList.add('translate-y-32', 'opacity-0'), 3000); } }
        function formatBytes(bytes) { if (!bytes || bytes === 0) return '0 B'; const k = 1024, sizes = ['B', 'KB', 'MB', 'GB']; const i = Math.floor(Math.log(bytes) / Math.log(k)); return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i]; }
    </script>
</body>
</html>
